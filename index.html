<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Seat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Find Your Seat</h1>
        <p>Type your name or select it from the list:</p>

        <div class="search-box">
            <input list="guestList" id="guestInput" placeholder="Enter your name..." autocomplete="off">
            
            <datalist id="guestList">
                </datalist>
            
            <button onclick="findSeat()">Find My Seat</button>
        </div>

        <div id="seating-grid" class="grid">
            </div>
        
        <div id="result-message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
